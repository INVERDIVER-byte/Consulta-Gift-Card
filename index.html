<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Gift Card</title>
<style>
  :root{
    --azul-1:#1F3864; --azul-2:#2E4057; --azul-3:#1A3A5C;
    --fondo:#F3F5F8; --tarjeta:#FFFFFF; --texto:#1C2530; --texto-suave:#5B6572; --linea:#E3E7ED;
    --verde:#1E7A4C; --verde-fondo:#E7F5EC; --ambar:#966B0A; --ambar-fondo:#FBF0DA; --rojo:#A3312B; --rojo-fondo:#FBEAE9;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--fondo);color:var(--texto);-webkit-font-smoothing:antialiased;}
  .topbar{background:var(--azul-1);color:#fff;padding:18px 20px;text-align:center;}
  .topbar h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.2px;}
  .topbar p{margin:4px 0 0;font-size:12.5px;color:#C7D3E3;}
  .wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
  .card{background:var(--tarjeta);border-radius:14px;border:1px solid var(--linea);padding:20px;margin-bottom:16px;}
  #login-view .card{margin-top:24px;text-align:center;}
  #login-view h2{font-size:16px;margin:0 0 6px;}
  #login-view p{font-size:13px;color:var(--texto-suave);margin:0 0 14px;}
  select.mes-select{
    width:100%;font-size:14px;padding:10px;border-radius:10px;border:1.5px solid var(--linea);
    margin-bottom:14px;background:#fff;color:var(--texto);
  }
  #id-input{width:100%;font-size:20px;text-align:center;letter-spacing:1px;padding:12px;border-radius:10px;border:1.5px solid var(--linea);margin-bottom:14px;}
  #id-input:focus{outline:none;border-color:var(--azul-2);}
  button.primary{width:100%;background:var(--azul-1);color:#fff;border:none;padding:13px;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;}
  button.primary:active{background:var(--azul-3);}
  #error-msg, #load-msg{color:var(--rojo);font-size:13px;margin-top:10px;display:none;}
  #dashboard-view{display:none;}
  .emp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:10px;}
  .emp-header h2{font-size:17px;margin:0;}
  .emp-header .meta{font-size:12.5px;color:var(--texto-suave);margin-top:2px;}
  .salir{background:none;border:none;color:var(--azul-2);font-size:12.5px;text-decoration:underline;cursor:pointer;padding:4px;white-space:nowrap;}
  .mes-switch{font-size:12px;margin-top:10px;}
  .mes-switch select{font-size:12.5px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--linea);}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--azul-2);margin:0 0 12px;}
  .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12.5px;font-weight:700;}
  .badge.verde{background:var(--verde-fondo);color:var(--verde);}
  .badge.ambar{background:var(--ambar-fondo);color:var(--ambar);}
  .badge.rojo{background:var(--rojo-fondo);color:var(--rojo);}
  .stat-row{display:flex;gap:10px;margin-bottom:14px;}
  .stat{flex:1;background:var(--fondo);border-radius:10px;padding:10px 8px;text-align:center;}
  .stat .num{font-size:19px;font-weight:700;color:var(--azul-1);}
  .stat .lbl{font-size:11px;color:var(--texto-suave);margin-top:2px;}
  .barra-outer{height:9px;background:var(--linea);border-radius:6px;overflow:hidden;margin:8px 0 4px;}
  .barra-inner{height:100%;background:var(--verde);border-radius:6px;}
  .suc-item{border-top:1px solid var(--linea);padding:12px 0;}
  .suc-item:first-child{border-top:none;padding-top:0;}
  .suc-top{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .suc-nombre{font-size:14px;font-weight:700;}
  .suc-sub{font-size:12px;color:var(--texto-suave);margin-top:2px;}
  .suc-venta{font-size:14px;font-weight:700;color:var(--azul-1);text-align:right;}
  .suc-toggle{font-size:11px;color:var(--azul-2);}
  .dias-detalle{display:none;margin-top:10px;}
  .dias-detalle.abierto{display:block;}
  .dia-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:6px 8px;border-radius:6px;margin-bottom:4px;}
  .dia-row.ok{background:var(--verde-fondo);}
  .dia-row.no{background:var(--rojo-fondo);}
  .dia-fecha{font-weight:700;width:44px;}
  .dia-motivo{flex:1;color:var(--texto-suave);padding:0 8px;}
  .dia-monto{font-weight:700;}
  .tier-track{display:flex;gap:3px;margin:14px 0 8px;}
  .tier-seg{flex:1;height:10px;border-radius:4px;background:var(--linea);}
  .tier-seg.pasado{background:var(--azul-2);}
  .tier-seg.actual{background:var(--azul-1);}
  .tier-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--texto-suave);}
  .proy-linea{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-top:1px solid var(--linea);}
  .proy-linea:first-child{border-top:none;}
  .proy-linea .k{color:var(--texto-suave);}
  .proy-linea .v{font-weight:700;}
  .nota{font-size:12px;color:var(--texto-suave);background:var(--fondo);border-radius:8px;padding:10px 12px;margin-top:10px;line-height:1.5;}
  .footer-note{text-align:center;font-size:11px;color:#8B95A3;margin-top:20px;}
  .sin-datos{text-align:center;padding:30px 10px;color:var(--texto-suave);font-size:13.5px;}

  .total-box{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--azul-1);color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px;
  }
  .total-box .lbl{font-size:12px;color:#C7D3E3;}
  .total-box .num{font-size:22px;font-weight:700;}

  .stat-destacado{background:var(--verde-fondo)!important;border:1.5px solid var(--verde);}
  .stat-destacado .num{color:var(--verde)!important;font-size:23px!important;}
  .stat-destacado .lbl{color:var(--verde)!important;font-weight:700;}

  table.tabla-rangos{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px;}
  table.tabla-rangos th{background:var(--azul-1);color:#fff;padding:7px 8px;font-size:11px;text-align:left;}
  table.tabla-rangos td{padding:7px 8px;border-bottom:1px solid var(--linea);}
  table.tabla-rangos tr.fila-actual td{background:var(--verde-fondo);font-weight:700;color:var(--verde);}
  table.tabla-rangos tr.fila-actual td:first-child{border-left:3px solid var(--verde);}
</style>
</head>
<body>

<div class="topbar">
  <h1>Mi Gift Card</h1>
  <p id="mes-label">cargando…</p>
</div>

<div class="wrap">

  <div id="login-view">
    <div class="card">
      <h2>Consulta tu progreso</h2>
      <p>Elige el mes e ingresa tu número de empleado (ID)</p>
      <select id="mes-select-login" class="mes-select"></select>
      <input id="id-input" type="tel" inputmode="numeric" placeholder="Ej. 1592" maxlength="8">
      <button class="primary" onclick="buscar()">Ver mi progreso</button>
      <div id="error-msg"></div>
    </div>
  </div>

  <div id="dashboard-view">
    <div class="card">
      <div class="emp-header">
        <div>
          <h2 id="d-nombre"></h2>
          <div class="meta" id="d-meta"></div>
        </div>
        <button class="salir" onclick="salir()">Buscar otro ID</button>
      </div>
      <div class="mes-switch">
        Viendo: <select id="mes-select-dash" onchange="cambiarMes(this.value)"></select>
      </div>
    </div>

    <div id="contenido-mes"></div>

    <div class="footer-note">Los montos se recalculan cada semana con las marcaciones y ventas reales. Esta proyección es un estimado, no un monto garantizado.</div>
  </div>

</div>

<script>
let MESES = [];
let DATA_CACHE = {};
let ID_ACTUAL = null;

function money(n){
  return '$' + Number(n).toLocaleString('es-SV', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function cargarManifest(){
  const res = await fetch('meses.json', {cache:'no-store'});
  const manifest = await res.json();
  MESES = manifest.meses; // [{key,label}], más reciente primero
  const selLogin = document.getElementById('mes-select-login');
  const selDash = document.getElementById('mes-select-dash');
  selLogin.innerHTML = '';
  selDash.innerHTML = '';
  MESES.forEach(m => {
    selLogin.innerHTML += `<option value="${m.key}">${m.label}</option>`;
    selDash.innerHTML += `<option value="${m.key}">${m.label}</option>`;
  });
  document.getElementById('mes-label').textContent = MESES.length ? MESES[0].label : '';
}

async function cargarDatosMes(key){
  if(DATA_CACHE[key]) return DATA_CACHE[key];
  const res = await fetch(key + '.json', {cache:'no-store'});
  const data = await res.json();
  DATA_CACHE[key] = data;
  return data;
}

async function buscar(){
  const id = document.getElementById('id-input').value.trim();
  const mesKey = document.getElementById('mes-select-login').value;
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  if(!id){ return; }
  const data = await cargarDatosMes(mesKey);
  const emp = data.empleados[id];
  if(!emp){
    err.textContent = 'No encontramos ese ID en ' + labelDeMes(mesKey) + '. Verifica el número o prueba otro mes.';
    err.style.display = 'block';
    return;
  }
  ID_ACTUAL = id;
  document.getElementById('mes-select-dash').value = mesKey;
  render(mesKey, id, emp, data.meta);
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('dashboard-view').style.display = 'block';
}

async function cambiarMes(mesKey){
  const data = await cargarDatosMes(mesKey);
  const emp = data.empleados[ID_ACTUAL];
  const cont = document.getElementById('contenido-mes');
  if(!emp){
    cont.innerHTML = '<div class="card"><div class="sin-datos">No hay datos para tu ID en ' + labelDeMes(mesKey) + '.</div></div>';
    document.getElementById('d-meta').textContent = labelDeMes(mesKey);
    return;
  }
  render(mesKey, ID_ACTUAL, emp, data.meta);
}

function labelDeMes(key){
  const m = MESES.find(x => x.key === key);
  return m ? m.label : key;
}

function salir(){
  document.getElementById('dashboard-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('id-input').value = '';
  document.getElementById('id-input').focus();
  ID_ACTUAL = null;
}

document.getElementById('id-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') buscar();
});

function render(mesKey, id, emp, meta){
  document.getElementById('d-nombre').textContent = emp.nombre;
  document.getElementById('d-meta').textContent = emp.cargo + ' · ' + emp.sucursal_principal + ' · ID ' + id;

  const cont = document.getElementById('contenido-mes');
  const pct = emp.dias_trabajados > 0 ? Math.round(100 * emp.dias_califican / emp.dias_trabajados) : 0;
  const colorPct = pct >= 90 ? 'var(--verde)' : (pct >= 70 ? 'var(--ambar)' : 'var(--rojo)');
  const badge = pct >= 90
    ? '<span class="badge verde">Vas muy bien</span>'
    : (pct >= 70 ? '<span class="badge ambar">Puedes mejorar</span>' : '<span class="badge rojo">En riesgo, revisa tus días fallados</span>');

  let sucHtml = '';
  emp.sucursales.forEach((s, idx) => {
    const detalleId = 'det-' + idx;
    const fallados = s.dias.filter(d => !d.califica).length;
    let diasHtml = '';
    s.dias.forEach(d => {
      const motivo = d.califica ? 'Calificó' : (d.solo_una_marcacion ? 'Solo 1 marcación' : 'Menos de 6h trabajadas');
      diasHtml += `<div class="dia-row ${d.califica ? 'ok' : 'no'}"><span class="dia-fecha">${d.fecha}</span><span class="dia-motivo">${motivo} · ${d.horas}</span><span class="dia-monto">${money(d.venta_asignada)}</span></div>`;
    });
    sucHtml += `
      <div class="suc-item">
        <div class="suc-top" onclick="toggleDetalle('${detalleId}')">
          <div>
            <div class="suc-nombre">${s.sucursal}</div>
            <div class="suc-sub">${s.dias_califican}/${s.dias_trabajados} días califican${fallados > 0 ? ' · ' + fallados + ' fallado(s)' : ''}</div>
          </div>
          <div>
            <div class="suc-venta">${money(s.venta_asignada)}</div>
            <div class="suc-toggle" id="toggle-${detalleId}">ver detalle ▾</div>
          </div>
        </div>
        <div class="dias-detalle" id="${detalleId}">${diasHtml}</div>
      </div>`;
  });

  const pr = emp.proyeccion;
  const tiers = [10,20,40,60,80,100];
  let trackHtml = '';
  tiers.forEach(t => {
    let cls = 'tier-seg';
    if(pr.tier_proyectado >= t) cls += ' pasado';
    if(pr.tier_proyectado === t) cls += ' actual';
    trackHtml += `<div class="${cls}"></div>`;
  });

  const RANGOS_GC1 = [
    {label:'$4,500 – $5,000', monto:10, min:4500, max:5000},
    {label:'$5,001 – $5,500', monto:20, min:5001, max:5500},
    {label:'$5,501 – $6,000', monto:40, min:5501, max:6000},
    {label:'$6,001 – $6,500', monto:60, min:6001, max:6500},
    {label:'$6,501 – $7,500', monto:80, min:6501, max:7500},
    {label:'$7,501 en adelante', monto:100, min:7501, max:Infinity},
  ];
  let tablaHtml = '<table class="tabla-rangos"><thead><tr><th>Rango de venta consolidada</th><th>Gift Card 1</th></tr></thead><tbody>';
  RANGOS_GC1.forEach(rg => {
    const esActual = emp.venta_consolidada >= rg.min && emp.venta_consolidada <= rg.max;
    tablaHtml += `<tr class="${esActual ? 'fila-actual' : ''}"><td>${rg.label}${esActual ? ' ← estás aquí' : ''}</td><td>${money(rg.monto)}</td></tr>`;
  });
  tablaHtml += '</tbody></table>';
  if(emp.venta_consolidada < 4500){
    tablaHtml += `<div class="nota" style="margin-top:8px;">Aún no alcanzas el primer rango — te faltan ${money(4500 - emp.venta_consolidada)} en venta consolidada.</div>`;
  }

  const sigTxt = pr.siguiente_tier
    ? `Con tu ritmo actual (${money(pr.ritmo_diario)}/día proyectado), si continúas así llegarías a ${money(pr.venta_proyectada)} en ventas consolidadas. Te faltarían ${money(pr.siguiente_tier.venta_faltante)} en venta para subir a la Gift Card de ${money(pr.siguiente_tier.monto)}.`
    : `Con tu ritmo actual, proyectas ${money(pr.venta_proyectada)} en ventas consolidadas — ¡ya alcanzarías el nivel máximo de Gift Card 1!`;

  let jefeHtml = '';
  if(pr.es_jefe){
    const falta = Math.max(0, pr.bono_jefe_umbral - pr.venta_proyectada);
    jefeHtml = `<div class="proy-linea">` + (falta > 0
      ? `<span class="k">Bono Jefe de Sucursal (+${money(pr.bono_jefe_monto)})</span><span class="v">te faltan ${money(falta)}</span>`
      : `<span class="k">Bono Jefe de Sucursal</span><span class="v">en camino a calificar</span>`) + `</div>`;
  }

  let gc2Txt;
  if(pr.aplica_gc2){
    gc2Txt = 'Ya cumples los requisitos base para aplicar a Gift Card 2 (según venta y días calificados). El monto final depende del presupuesto de tu sucursal.';
  } else {
    const partes = [];
    if(pr.gc2_venta_falta > 0) partes.push(`${money(pr.gc2_venta_falta)} más en venta`);
    if(pr.gc2_dias_faltan > 0) partes.push(`${pr.gc2_dias_faltan} día(s) calificado(s) más`);
    gc2Txt = partes.length ? `Para aplicar a Gift Card 2 te faltan: ${partes.join(' y ')}.` : 'Estás cerca de cumplir los requisitos de Gift Card 2.';
  }

  cont.innerHTML = `
    <div class="card">
      <div class="section-title">Cumplimiento a la fecha</div>
      <div class="stat-row">
        <div class="stat"><div class="num">${emp.dias_trabajados}</div><div class="lbl">días trabajados</div></div>
        <div class="stat"><div class="num">${emp.dias_califican}</div><div class="lbl">días califican</div></div>
        <div class="stat"><div class="num">${pct}%</div><div class="lbl">cumplimiento</div></div>
      </div>
      <div class="barra-outer"><div class="barra-inner" style="width:${pct}%;background:${colorPct};"></div></div>
      <div style="margin-top:8px;">${badge}</div>
    </div>

    <div class="card">
      <div class="section-title">Distribución de tu venta por sucursal</div>
      ${emp.sucursales.length > 1 ? `<div class="total-box"><span class="lbl">Venta consolidada (todas tus sucursales)</span><span class="num">${money(emp.venta_consolidada)}</span></div>` : ''}
      ${sucHtml || '<div class="sin-datos">Sin marcaciones registradas este mes.</div>'}
    </div>

    <div class="card">
      <div class="section-title">Lo que llevas ganado a la fecha</div>
      <div class="stat-row">
        <div class="stat stat-destacado"><div class="num">${money(emp.gc1 + emp.bono_jefe)}</div><div class="lbl">Gift Card 1 hoy</div></div>
        <div class="stat"><div class="num">${money(pr.tier_proyectado)}</div><div class="lbl">proyectado a fin de mes</div></div>
      </div>
      <div class="tier-track">${trackHtml}</div>
      <div class="tier-labels"><span>$10</span><span>$20</span><span>$40</span><span>$60</span><span>$80</span><span>$100</span></div>
      ${tablaHtml}
      <div class="nota" style="margin-top:10px;">${sigTxt}</div>
      ${jefeHtml}
      <div class="nota" style="margin-top:8px;">${gc2Txt}</div>
    </div>
  `;
}

function toggleDetalle(id){
  const el = document.getElementById(id);
  const toggle = document.getElementById('toggle-' + id);
  el.classList.toggle('abierto');
  toggle.textContent = el.classList.contains('abierto') ? 'ocultar detalle ▴' : 'ver detalle ▾';
}

cargarManifest();
</script>

</body>
</html>
